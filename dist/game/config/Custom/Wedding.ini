# ---------------------------------------------------------------------------
# 婚禮系統
# ---------------------------------------------------------------------------
#
# 婚禮管理員 NPC ID: 50007
#
# 第一部分 - "訂婚"
# 1) 鎖定你想要結為伴侶的玩家
# 2) 使用語音指令 ".engage 伴侶名稱" 然後按 Enter
# 3) 如果目標玩家將你列為好友 (即你們互相在好友列表中)，會彈出訂婚請求和系統訊息
# 4) 如果目標玩家接受訂婚邀請，你們就訂婚了
#
# 第二部分 - "結婚"
# 1) 一旦兩位玩家訂婚，他們可以找安卓美達 (婚禮祭司) 對話，位於溫泉公會之家 (哥達德區域)
#    (你可能需要禮服和金幣來支付婚禮費用！)
# 2) 每位玩家都需要與 NPC 對話並提出結婚請求
# 3) 完成後，會顯示煙火，兩位玩家就結婚了
#
# 之後你可以使用語音指令 ".gotolove 伴侶名稱" 傳送到你的伴侶身邊 (可能需要支付下方指定的費用)
#
# 如果你想取消訂婚/婚姻，使用語音指令 ".divorce 伴侶名稱"
#
# 如果你已婚，你必須支付指定百分比的金幣給你的伴侶
#
# 如果玩家在已婚狀態下嘗試與其他玩家訂婚，如果啟用下方設定，可能會受到懲罰
# ---------------------------------------------------------------------------

# 是否啟用婚禮系統
# True = 啟用婚禮系統
# False = 停用婚禮系統
AllowWedding = False

# 結婚所需的金幣數量
# 預設: 250000000 (2.5億金幣)
# 雙方各需支付此金額
WeddingPrice = 2500000000

# 是否懲罰已婚玩家嘗試與其他玩家訂婚的行為
# True = 啟用懲罰 (出軌懲罰)
# False = 不懲罰
WeddingPunishInfidelity = True

# 是否啟用已婚夫妻的傳送功能
# True = 啟用 .gotolove 指令
# False = 停用傳送功能
WeddingTeleport = True

# 傳送到伴侶身邊所需的金幣數量
# 預設: 50000 (5萬金幣)
WeddingTeleportPrice = 50000000

# 使用傳送技能後，角色傳送前的等待時間 (秒)
# 預設: 60 秒
# 類似讀條時間，期間可能被打斷
WeddingTeleportDuration = 10

# 是否允許同性婚姻
# True = 允許同性別玩家結婚
# False = 只允許異性結婚
WeddingAllowSameSex = True

# 結婚時是否要求玩家穿著禮服
# True = 必須穿著禮服 (道具 ID: 6408)
# False = 不需要禮服
WeddingFormalWear = True

# 離婚時需要支付給對方的金幣百分比
# 預設: 20 (支付自己金幣的 20% 給對方)
# 這是對離婚的懲罰機制
WeddingDivorceCosts = 20
