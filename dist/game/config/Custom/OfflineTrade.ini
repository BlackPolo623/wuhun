# ---------------------------------------------------------------------------
# 離線交易/製作系統
# ---------------------------------------------------------------------------

# 是否啟用離線交易功能
# True = 啟用，玩家可以離線擺攤
# False = 停用
OfflineTradeEnable = True

# 是否啟用離線製作功能 (工坊)
# True = 啟用，玩家可以離線開設工坊
# False = 停用
OfflineCraftEnable = True

# 是否只允許在和平區域使用離線商店
# True = 只能在和平區域 (城鎮等) 擺攤
# False = 任何地方都可以擺攤
OfflineModeInPeaceZone = True

# 離線商店模式下是否無敵 (不受傷害)
# True = 離線商店角色無法被攻擊和殺死
# False = 離線商店角色可以被攻擊
OfflineModeNoDamage = True

# 進入離線模式時是否改變角色名稱顏色
# True = 改變顏色以區分離線商店
# False = 保持原本顏色
OfflineSetNameColor = True

# 離線模式下的名稱顏色 (16進制色碼)
# 預設 808080 = 灰色
# 只有在 OfflineSetNameColor = True 時生效
OfflineNameColor = 808080

# 離線模式下是否允許獲得聲望值
# True = 離線商店角色可以獲得聲望
# False = 離線商店角色不獲得聲望
OfflineFame = True

# 伺服器重啟後是否恢復離線商店
# True = 重啟後自動恢復所有離線商店
# False = 重啟後不恢復，玩家需要重新上線擺攤
RestoreOffliners = True

# 離線商店最多保留天數
# 超過指定天數的離線商店將不會被恢復
# 需要重啟伺服器才會斷開過期的商店
# 0 = 停用 (永遠恢復)
OfflineMaxDays = 0

# 商店交易完成後是否自動斷線
# True = 當商品全部賣完/買完後自動下線
# False = 即使交易完成也保持在線
OfflineDisconnectFinished = True

# 當同帳號的其他角色登入時，是否斷開離線商店
# True = 同帳號登入時，離線商店會被踢下線
# False = 同帳號可以同時有離線商店和在線角色
OfflineDisconnectSameAccount = False

# 是否即時儲存離線商店的交易記錄
# True = 每筆交易立即寫入資料庫 (更安全但消耗更多資源)
# False = 定期批次寫入 (效能較好但意外關機可能遺失資料)
# 建議開啟以防止伺服器意外關閉時資料遺失
StoreOfflineTradeInRealtime = True

# 是否啟用 .offline 指令讓玩家登出並保持商店
# True = 玩家可以使用 .offline 指令進入離線商店模式
# False = 停用此指令
EnableOfflineCommand = True

# 離線商店角色的視覺特效
# 可以使用多個特效名稱，用逗號分隔，系統會隨機選擇
# 留空 = 不使用特效
# 範例: DORMANT_USER (休眠使用者特效)
OfflineAbnormalEffect = SHARK_COSTUME
