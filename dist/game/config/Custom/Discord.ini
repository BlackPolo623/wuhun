# ================================================================
# Discord Bot 設定
# ================================================================
# 注意：需要將 JDA-5.x.x-withDependencies.jar 放入 dist/game/libs/
# 並在啟動腳本（GameServer.bat / .sh）的 classpath 中加入此 jar

# 是否啟用 Discord Bot 功能
# 若 Token 為空則自動停用
DiscordBotEnabled = False

# Discord Bot Token（從 Discord Developer Portal → Bot → Token 取得）
# 範例：BotToken = MTIzNDU2Nzg5.XXXXXX.YYYYYY-ZZZZZZZ
BotToken =

# 驗證碼有效時間（分鐘），玩家需在此時間內完成綁定
BindCodeExpireMinutes = 5

# ================================================================
# PVP / PK Discord 頻道公告
# ================================================================

# 是否將 PVP/PK 事件發送到 Discord 文字頻道
DiscordPvpAnnounceEnabled = True

# 要發送公告的 Discord 文字頻道 ID
# 取得方式：Discord → 設定 → 開啟開發者模式 → 對目標頻道右鍵 → 複製頻道 ID
DiscordPvpChannelId = 1500793664958365788

# ================================================================
# 新成員歡迎訊息
# ================================================================

# 是否在新成員加入 Discord 伺服器時自動發送歡迎私訊
# 注意：需在 Discord Developer Portal → Bot → Privileged Gateway Intents 開啟 Server Members Intent
DiscordWelcomeEnabled = True

# ================================================================
# Boss 競標 Discord 通知系統
# ================================================================

# 是否啟用 Boss 競標 Discord 通知（需同時啟用 DiscordBotEnabled）
DiscordBossNotifyEnabled = True

# 所有 Boss 通知發送至此頻道（統一使用單一頻道）
# 取得方式：Discord → 設定 → 開啟開發者模式 → 對目標頻道右鍵 → 複製頻道 ID
DiscordBossNotifyChannelId =

# 預警 / 首領降臨 / 競標倒數通知是否附加 @everyone 提及
# True = 發送時加上 @everyone 提醒全員
DiscordBossNotifyMentionEveryone = True

# 世界首領重生前幾分鐘發送預警通知
# 0 = 停用預警（不會發送重生前倒數）
DiscordBossSpawnWarningMinutes = 5

# 競標結束前幾分鐘發送倒數警告
# 0 = 停用倒數警告
DiscordBossAuctionEndWarningMinutes = 5

# 結算報告中是否顯示各玩家的詳細傷害數字
# True  = 顯示「PlayerA  1,234,567,890 傷害」
# False = 只顯示達標玩家名稱列表（不顯示傷害數字）
DiscordBossShowDamageInReport = True

# ================================================================
# 系統介紹面板
# ================================================================
# Bot 在指定頻道發送一則帶有按鈕的介紹訊息
# 玩家點擊按鈕後，Bot 以私訊傳送該系統的詳細說明
#
# 說明文件存放位置：config/Custom/SystemGuides/*.md
# 新增系統：在該目錄建立新的 .md 文件，重啟 Bot 即自動生效
# 詳細格式請參閱 SystemGuides/ 目錄下的範例文件

# 是否啟用系統介紹面板功能
SystemGuideEnabled = True

# 發送介紹面板的頻道 ID（建議使用獨立的「系統介紹」頻道）
# 取得方式：Discord → 設定 → 開啟開發者模式 → 對目標頻道右鍵 → 複製頻道 ID
SystemGuideChannelId =

# 面板 Embed 標題文字
SystemGuidePanelTitle = :satellite: 武魂天堂2 系統介紹

# 面板 Embed 說明文字（顯示在標題下方）
SystemGuidePanelDesc = 點擊想了解的系統，Bot 將私訊傳送詳細玩法說明。
