# ================================================================
# Discord Bot 設定
# ================================================================
# 注意：需要將 JDA-5.x.x-withDependencies.jar 放入 dist/game/libs/
# 並在啟動腳本（GameServer.bat / .sh）的 classpath 中加入此 jar

# 是否啟用 Discord Bot 功能
# 若 Token 為空則自動停用
DiscordBotEnabled = False

# Discord Bot Token（從 Discord Developer Portal → Bot → Token 取得）
# 範例：BotToken = MTIzNDU2Nzg5.XXXXXX.YYYYYY-ZZZZZZZ
BotToken = MTUwMDc4NTE0MDY0ODEyMDQzMA.GMBy6D.LHkP3ey0mYwALn6_RPb_27SMjViPRpxwqOhsRc

# 驗證碼有效時間（分鐘），玩家需在此時間內完成綁定
BindCodeExpireMinutes = 5

# ================================================================
# PVP / PK Discord 頻道公告
# ================================================================

# 是否將 PVP/PK 事件發送到 Discord 文字頻道
DiscordPvpAnnounceEnabled = True

# 要發送公告的 Discord 文字頻道 ID
# 取得方式：Discord → 設定 → 開啟開發者模式 → 對目標頻道右鍵 → 複製頻道 ID
DiscordPvpChannelId = 1500793664958365788

# ================================================================
# 新成員歡迎訊息
# ================================================================

# 是否在新成員加入 Discord 伺服器時自動發送歡迎私訊
# 注意：需在 Discord Developer Portal → Bot → Privileged Gateway Intents 開啟 Server Members Intent
DiscordWelcomeEnabled = True
