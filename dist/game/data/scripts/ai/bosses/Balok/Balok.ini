# =======================================================
# Balok Battle Configuration
# =======================================================

# -------------------------------------------------------
# 開始時間 (24小時制，格式 HH:mm)
# -------------------------------------------------------
BalokTime = 20:30

# -------------------------------------------------------
# 戰鬥與獎勵階段時長（分鐘）
# 注意：準備階段固定 20 分鐘（含 10 分鐘、1 分鐘提醒），不開放設定
# -------------------------------------------------------
BattleTimeMinutes = 30
RewardTimeMinutes = 40

# -------------------------------------------------------
# 積分設定
# -------------------------------------------------------
# 一般怪物每隻給予的積分
PointsPerMonster = 10

# 蠍子（NPC 22416）的積分倍率：實際積分 = PointsPerMonster * ScorpionMultiplier
ScorpionMultiplier = 10

# -------------------------------------------------------
# 階段推進門檻（全服累積積分）
# -------------------------------------------------------
# 達到此積分後進入 Stage 2
Stage2PointThreshold = 250000

# Stage 2 達到此積分後召喚第一波中型 BOSS（Kesma / Prais / Vira）
Wave1SpawnPointThreshold = 320000

# Stage 3 達到此積分後召喚第二波中型 BOSS（Heeder / Hearak）
Wave2SpawnPointThreshold = 800000

# 累積積分超過此值時，最終 BOSS 直接升級為 Lord Balok
LordBalokPointThreshold = 1500000

# -------------------------------------------------------
# 隨機跳轉機制（Stage 1 低積分時的特殊觸發）
# -------------------------------------------------------
# Stage 1 且全服積分 < BypassPointThreshold 時
# 每次擊殺怪物有 BypassRandomChance / 5000 的機率直接跳到最終 BOSS 階段
BypassPointThreshold = 3000
BypassRandomChance = 10

# -------------------------------------------------------
# 獎勵資格設定
# -------------------------------------------------------
# 玩家個人積分至少需達到此值，才有資格獲得最終活動獎勵
MinPointsForReward = 1000

# 活動結束後，排名前 N 名的玩家會收到特殊排行榜郵件獎勵
TopRankerCount = 30
