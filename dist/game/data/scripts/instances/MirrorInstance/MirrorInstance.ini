# ==============================================================
# 鏡像副本系統設定
# Mirror Instance System Configuration
# ==============================================================

# 是否啟用鏡像副本系統
# Enable the mirror instance system
MirrorInstanceEnabled = true

# 副本進入NPC ID（需在custom.xml中定義）
# Entry NPC ID (must be defined in custom.xml)
MirrorInstanceNpcId = 900041

# 鏡像怪物 FakePlayer NPC ID（需在XML中定義為 isFakePlayer="true" 的 NPC）
# Mirror monster FakePlayer NPC ID (must be defined as isFakePlayer NPC in XML)
MirrorFakePlayerNpcId = 80002

# 副本模板ID（需在 instances/ 目錄中有對應的 XML）
# Instance template ID (must have corresponding XML in instances/ folder)
MirrorInstanceTemplateId = 902

# 入場消耗道具ID
# Entry cost item ID
MirrorEntryItemId = 91663

# 入場消耗道具數量
# Entry cost item count
MirrorEntryItemCount = 5000

# 每日挑戰次數上限
# Daily challenge limit per player
MirrorDailyLimit = 50

# 每日重置小時（0-23，伺服器時間）
# Daily reset hour (0-23, server time)
MirrorResetHour = 0

# 怪物基礎攻擊加成（玩家攻擊力面板數值 + 此數值）* 倍率 = 怪物攻擊力
# Monster base attack bonus added to player's P.Atk before multiplier
MirrorBaseAttack = 1000000

# 怪物基礎防禦加成（玩家防禦力面板數值 + 此數值）* 倍率 = 怪物防禦力
# Monster base defense bonus added to player's P.Def before multiplier
MirrorBaseDefense = 1000000

# 怪物基礎HP加成（玩家MaxHP面板數值 + 此數值）* 倍率 = 怪物MaxHP
# Monster base HP bonus added to player's MaxHP before multiplier
MirrorBaseHp = 1000000

# 可選倍率列表（逗號分隔）
# Available multipliers (comma-separated)
MirrorAvailableMultipliers = 2,3,5,8,10,15,20,25,50

# 每次成功挑戰獲得的無視最終減傷加成值（單位：%）
# 例如：0.01 = 每次通關獲得 0.01% 無視減傷
# 倍率會影響獎勵：挑戰10倍鏡像 = 0.01 × 10 = 0.10% 無視減傷
# Ignore FINAL_DAMAGE_REDUCE reward per successful run (unit: %)
# Example: 0.01 = gain 0.01% ignore damage reduction per run
# Multiplier affects reward: 10x challenge = 0.01 × 10 = 0.10% ignore reduction
MirrorRewardFdrPerRun = 0.01

# 無視最終減傷的最大累積上限（單位：%）
# 例如：50.0 = 最多累積 50% 無視減傷（BOSS 99.99%減傷 → 實際49.99%減傷）
# Maximum accumulated ignore FINAL_DAMAGE_REDUCE cap (unit: %)
# Example: 50.0 = max 50% ignore reduction (BOSS 99.99% reduction → actual 49.99% reduction)
MirrorMaxFinalDamageReduce = 50.0

# 副本掉落道具ID（-1 表示不掉落）
# Reward item ID on success (-1 = no item reward)
MirrorRewardItemId = -1

# 副本掉落道具數量
# Reward item count on success
MirrorRewardItemCount = 0
