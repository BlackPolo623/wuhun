<html><head><title>鋼鐵之城</title></head>

<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>

            <table border=0 cellpadding=0 cellspacing=0>

                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="00FF66">金屬鑄錠</font></td>
                                <td align="center"><font color="FFFF00" size="4"><b>%weekly_count%</b></font> <font color="808080">/ 800000</font></td>
                            </tr>
                        </table>
                    </td>
                </tr>
