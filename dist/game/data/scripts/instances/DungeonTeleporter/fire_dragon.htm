<html>
<head><title>火龍神殿</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td align=center>
  <font color="FF6644" size="3"><b>火龍神殿</b></font>
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>


<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="2A0000">
    <td width=120><font color="FF9966">本週剩餘次數</font></td>
    <td><font color="FFFFFF">%remaining% / %maxEntries%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="FF9966">距離重置</font></td>
    <td><font color="888888">%resetTime%</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="1A1A1A">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport enterFireDragon" value="進入火龍神殿" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport show_sweep" value="掃蕩（需先通關一次）" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport multisell_fire" value="製作火龍副本相關道具" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest DungeonTeleport mainPage" value="返回選擇" width=130 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

</body>
</html>
