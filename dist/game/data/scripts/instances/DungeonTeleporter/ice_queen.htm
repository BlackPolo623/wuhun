<html>
<head><title>冰凍女王副本</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td align=center>
  <font color="44AAFF" size="3"><b>冰凍女王副本</b></font>
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>


<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="001A2A">
    <td width=120><font color="66CCFF">本週剩餘次數</font></td>
    <td><font color="FFFFFF">%remaining% / %maxEntries%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="66CCFF">距離重置</font></td>
    <td><font color="888888">%resetTime%</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="1A1A1A">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport enterIceQueen" value="進入冰凍女王副本" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport show_ice_sweep" value="掃蕩（需通關第三階段）" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport multisell_ice" value="製作冰凍副本相關道具" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport exchange_ice_1" value="極神武器【冰晶★】轉換" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport exchange_ice_2" value="極神武器【冰魄★★】轉換" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      <button action="bypass -h Quest DungeonTeleport exchange_ice_3" value="極神武器【冰煞★★★】轉換" width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest DungeonTeleport mainPage" value="返回選擇" width=130 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

</body>
</html>
