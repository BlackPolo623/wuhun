<html>
<head><title>火龍副本 - 掃蕩</title></head>
<body scroll="no">

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td align=center>
  <font color="FF6644" size="3"><b>火龍副本 掃蕩</b></font>
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>


<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="2A1000">
    <td width=120><font color="FF9966">消耗道具</font></td>
    <td><font color="FF9900">%sweep_item_name% × %sweep_item_count%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="FF9966">剩餘次數</font></td>
    <td><font color="FFFFFF">%remaining% / %maxEntries%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="FF9966">掃蕩抽獎次數</font></td>
    <td><font color="00FF88">%sweep_count% 次</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>


<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=4></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="1A1A1A">
    <td align=center>
      <font color="FF9966">裝備過濾：</font>%filter_status%
    </td>
  </tr>
  <tr bgcolor="141414">
    <td align=center>
      %filter_btn%
    </td>
  </tr>
  <tr bgcolor="0D0D0D">
    <td align=center>
      <font color="666666" size=1>開啟後抽到裝備類道具將不予發放，但仍消耗抽獎次數。</font>
    </td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr>
  <td align=center>
    <button action="bypass -h Quest DungeonTeleport execute_sweep" value="確認掃蕩" width=130 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
  </td>
  <td align=center>
    <button action="bypass -h Quest DungeonTeleport showFireDragon" value="返回" width=100 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
  </td>
</tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

</body>
</html>
