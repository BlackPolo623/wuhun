<html>
<head><title>掠奪之地</title></head>
<body scroll="no">

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>


<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr>
    <td width=90><font color="FF9966">擊殺進度</font></td>
    <td><font color="FFFFFF">%kill_progress%</font></td>
  </tr>
  <tr>
    <td width=90><font color="FF9966">下次開放</font></td>
    <td><font color="FFFFFF">%next_time%</font></td>
  </tr>
  <tr>
    <td width=90><font color="FFCC33">上週佔領</font></td>
    <td><font color="FFFF44">%last_winner%</font></td>
  </tr>
  <tr>
    <td width=90><font color="FFCC33">本週第一</font></td>
    <td><font color="00FF88">%current_top%</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr>
    <td><font color="AAAAAA">・ 整個副本為 </font><font color="FF4444">PVP 區域</font><font color="AAAAAA">，可自由攻擊玩家</font></td>
  </tr>
  <tr>
    <td><font color="AAAAAA">・ 死亡時指定道具將</font><font color="FF4444">掉落擁有的70%</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
  <tr >
    <td align=center colspan=2><font color="FF9966">選擇進入點</font></td>
  </tr>
  <tr><td height=6></td></tr>
</table>
<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr >
    <td width=135 align=center>
      <button action="bypass -h Quest PlunderLands enter" value="大門" width=120 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
    <td width=135 align=center>
      <button action="bypass -h Quest PlunderLands enterA" value="進入點 A" width=120 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
  <tr >
    <td width=135 align=center>
      <button action="bypass -h Quest PlunderLands enterB" value="進入點 B" width=120 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
    <td width=135 align=center>
      <button action="bypass -h Quest PlunderLands enterC" value="進入點 C" width=120 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest PlunderLands showRank_0" value="查看副本內玩家持有量" width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=4></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest PlunderLands shop" value="掠奪古文升級" width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=4></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest PlunderLands showClanRank_0" value="血盟積分排行" width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=4></td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=270>
<tr><td align=center>
  <button action="bypass -h Quest PlunderLands clanOccupy" value="血盟佔領功能" width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
</td></tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

</body>
</html>
