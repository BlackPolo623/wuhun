# ---------------------------------------------------------------------------
# 多層副本系統配置
# ---------------------------------------------------------------------------

# 最大層數 (1-5)
# Default: 5
MaxLayers = 5

# 入口NPC ID
# Default: 900043
EntranceNpcId = 900042

# 寶箱NPC ID（統一使用一個ID，依層數從資料庫讀取不同獎勵）
# Default: 900050
TreasureChestNpcId = 900043

# 傳送NPC ID（前往下一層）
# Default: 900045
TeleportNpcId = 900044

# 沒有傳送NPC時，多久後踢出玩家（秒）
# Default: 60
ExitDelay = 60

# ---------------------------------------------------------------------------
# 入場道具設定
# 每位隊員進入副本時都必須擁有足夠數量的指定道具，道具會在入場時扣除
# EntranceItemId   - 入場道具的物品ID（0 = 不需要道具）
# EntranceItemCount - 每人每次入場需要的數量
# ---------------------------------------------------------------------------

# 入場所需道具 ID（0 = 不需要）
# Default: 0
EntranceItemId = 0

# 入場所需道具數量（每人）
# Default: 1
EntranceItemCount = 1

# ---------------------------------------------------------------------------
# 隊伍人數限制
# ---------------------------------------------------------------------------

# 最少人數
# Default: 2
GroupMin = 2

# 最多人數
# Default: 7
GroupMax = 7

# ---------------------------------------------------------------------------
# 隊伍距離限制
# 進入副本時，每位隊員距離入口NPC的最大允許距離（單位：遊戲單位）
# Default: 1000
# ---------------------------------------------------------------------------
MaxEntryDistance = 1000

# ---------------------------------------------------------------------------
# 傳送NPC出現機率配置（每層獨立設定，越深層機率越低）
# 機率範圍: 0-100
# ---------------------------------------------------------------------------

# 第1層傳送NPC出現機率（最簡單）
Layer1TeleportChance = 90

# 第2層傳送NPC出現機率
Layer2TeleportChance = 80

# 第3層傳送NPC出現機率
Layer3TeleportChance = 70

# 第4層傳送NPC出現機率
Layer4TeleportChance = 60

# 第5層傳送NPC出現機率（最難）
Layer5TeleportChance = 50

# ---------------------------------------------------------------------------
# 層級模板配置
# 每層可用的副本模板ID（逗號分隔，進入時隨機選一個）
# ---------------------------------------------------------------------------

# 第1層可用模板
Layer1Templates = 300,301

# 第2層可用模板
Layer2Templates = 300,301,302

# 第3層可用模板
Layer3Templates = 301,302

# 第4層可用模板
Layer4Templates = 300,302

# 第5層可用模板
Layer5Templates = 302

# ---------------------------------------------------------------------------
# 怪物能力倍率配置
#
# HpMultiplier        - HP 倍率（相對怪物原始 HP）
# PAtkMultiplier      - 物理攻擊倍率
# MAtkMultiplier      - 魔法攻擊倍率
# PDefMultiplier      - 物理防禦倍率
# MDefMultiplier      - 魔法防禦倍率
# AtkSpdMultiplier    - 物理攻擊速度倍率（1.0 = 原始速度）
# CastSpdMultiplier   - 施法速度倍率（1.0 = 原始速度）
#
# FinalDamageReduce   - 最終減傷（%），受到傷害後減少此比例
#                       範圍: 0.0 ~ 99.999
#                       例: 90.0 = 受到的最終傷害減少 90%
#                       說明: 套用於怪物被攻擊時，在最終傷害計算前扣除
#                             可被玩家的「無視最終減傷」屬性部分抵消
# ---------------------------------------------------------------------------

# === 第1層 ===
Layer1HpMultiplier = 20.0
Layer1PAtkMultiplier = 20.0
Layer1MAtkMultiplier = 20.0
Layer1PDefMultiplier = 20.0
Layer1MDefMultiplier = 20.0
Layer1AtkSpdMultiplier = 1.0
Layer1CastSpdMultiplier = 1.0
Layer1FinalDamageReduce = 0.0

# === 第2層 ===
Layer2HpMultiplier = 40.0
Layer2PAtkMultiplier = 40.0
Layer2MAtkMultiplier = 40.0
Layer2PDefMultiplier = 40.0
Layer2MDefMultiplier = 40.0
Layer2AtkSpdMultiplier = 1.1
Layer2CastSpdMultiplier = 1.1
Layer2FinalDamageReduce = 0.0

# === 第3層 ===
Layer3HpMultiplier = 60.0
Layer3PAtkMultiplier = 60.0
Layer3MAtkMultiplier = 60.0
Layer3PDefMultiplier = 60.0
Layer3MDefMultiplier = 60.0
Layer3AtkSpdMultiplier = 1.2
Layer3CastSpdMultiplier = 1.2
Layer3FinalDamageReduce = 0.0

# === 第4層 ===
Layer4HpMultiplier = 80.0
Layer4PAtkMultiplier = 80.0
Layer4MAtkMultiplier = 80.0
Layer4PDefMultiplier = 80.0
Layer4MDefMultiplier = 80.0
Layer4AtkSpdMultiplier = 1.3
Layer4CastSpdMultiplier = 1.3
Layer4FinalDamageReduce = 0.0

# === 第5層 ===
Layer5HpMultiplier = 100.0
Layer5PAtkMultiplier = 100.0
Layer5MAtkMultiplier = 100.0
Layer5PDefMultiplier = 100.0
Layer5MDefMultiplier = 100.0
Layer5AtkSpdMultiplier = 1.5
Layer5CastSpdMultiplier = 1.5
Layer5FinalDamageReduce = 0.0
