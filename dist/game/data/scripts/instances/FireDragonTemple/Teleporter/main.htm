<html>
<head><title>火龍副本傳送</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358 background="L2UI_CH3.refinewnd_back_Pattern">
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr>
                    <td align=center width=185 height=185 background="BranchSys3.icon2.ArmyTrainingEmblem"></td>
                </tr>
            </table>
            <table border=0 cellpadding=0 cellspacing=0>
                <tr>
                    <td align=center>火龍盤踞於熔岩深處，散發著灼熱的威壓。</td>
                </tr>
                <tr>
                    <td height=10></td>
                </tr>
                <tr>
                    <td align=center>你想挑戰火龍副本嗎？</td>
                </tr>
                <tr>
                    <td height=5></td>
                </tr>
                <tr>
                    <td align=center><font color="LEVEL">本週剩餘次數：%remaining% / %maxEntries%</font></td>
                </tr>
                <tr>
                    <td align=center><font color="808080">距離重置：%resetTime%</font></td>
                </tr>
                <tr>
                    <td height=10></td>
                </tr>
                <tr>
                    <td align=center>
                        <button action="bypass -h Quest FireDragonTeleport enterInstance" value="進入火龍副本" width="230" height="31" back="BranchSys3.icon2.ArmyTrainingBtn_down" fore="L2UI_CT1.OlympiadWnd_DF_Apply"/>
                    </td>
                </tr>
                <tr>
                    <td height=5></td>
                </tr>
                <tr>
                    <td align=center>
                        <button action="bypass -h Quest FireDragonTeleport show_sweep" value="掃蕩（需先通關一次）" width="230" height="31" back="BranchSys3.icon2.ArmyTrainingBtn_down" fore="L2UI_CT1.OlympiadWnd_DF_Apply"/>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
