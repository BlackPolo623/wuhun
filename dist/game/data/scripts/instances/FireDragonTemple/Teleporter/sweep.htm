<html>
<head><title>火龍副本 - 掃蕩確認</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358 background="L2UI_CH3.refinewnd_back_Pattern">
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr>
                    <td align=center width=185 height=100 background="BranchSys3.icon2.ArmyTrainingEmblem"></td>
                </tr>
            </table>
            <table border=0 cellpadding=0 cellspacing=0>
                <tr>
                    <td align=center><font color="LEVEL" size="4"><b>火龍副本 掃蕩</b></font></td>
                </tr>
                <tr>
                    <td height=8></td>
                </tr>
                <tr>
                    <td align=center>
                        <table width="260" bgcolor="111111" border="0" cellspacing="1" cellpadding="4">
                            <tr bgcolor="222222">
                                <td align=left><font color="AAAAAA">消耗道具</font></td>
                                <td align=right><font color="FF9900">%sweep_item_name% × %sweep_item_count%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align=left><font color="AAAAAA">消耗週次數</font></td>
                                <td align=right><font color="FF9900">1 次（剩餘 %remaining%/%maxEntries%）</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align=left><font color="AAAAAA">獲得獎勵</font></td>
                                <td align=right><font color="00FF66">與通關副本相同</font></td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td height=10></td>
                </tr>
                <tr>
                    <td align=center>
                        <table border=0 cellpadding=0 cellspacing=4>
                            <tr>
                                <td>
                                    <button action="bypass -h Quest FireDragonTeleport execute_sweep" value="確認掃蕩" width="110" height="31" back="BranchSys3.icon2.ArmyTrainingBtn_down" fore="L2UI_CT1.OlympiadWnd_DF_Apply"/>
                                </td>
                                <td>
                                    <button action="bypass -h Quest FireDragonTeleport" value="關閉" width="100" height="31" back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
