<html><head><title>屬性加成總覽</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<table border=0 cellpadding=4 cellspacing=1 width=270 bgcolor="111111">
  <tr bgcolor="1A2A00">
    <td align=center><font color="FFCC33">屬性名稱</font></td>
    <td align=center><font color="FFCC33">當前加成</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">物理攻擊</font></td>
    <td align=center><font color="00FF66">%patk%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">魔法攻擊</font></td>
    <td align=center><font color="00FF66">%matk%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">物理防禦</font></td>
    <td align=center><font color="00FF66">%pdef%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">魔法防禦</font></td>
    <td align=center><font color="00FF66">%mdef%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">最大HP</font></td>
    <td align=center><font color="00FF66">%maxhp%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">最大MP</font></td>
    <td align=center><font color="00FF66">%maxmp%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">魔法致命傷害</font></td>
    <td align=center><font color="00FF66">%mcatk%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">物理致命傷害</font></td>
    <td align=center><font color="00FF66">%catk%%</font></td>
  </tr>
  <tr bgcolor="1A1A1A">
    <td><font color="AAAAAA">物理技能致命傷害</font></td>
    <td align=center><font color="00FF66">%skillcatk%%</font></td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=8></td></tr>
</table>

<img src="L2UI.SquareGray" width="270" height="1">

<table border=0 cellpadding=3 cellspacing=1 width=270>
  <tr><td height=4></td></tr>
  <tr>
    <td align=center>
      <button action="bypass -h Quest wxcz upgrade_stats" value="前往提升" width=130 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
      <button action="bypass -h Quest wxcz main" value="返回主頁" width=120 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
    </td>
  </tr>
</table>

<table border=0 cellpadding=0 cellspacing=0 width=292>
<tr><td height=6></td></tr>
</table>

</body>
</html>
