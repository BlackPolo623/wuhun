<html><head><title>魂契</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>

                <tr><td height=12></td></tr>


                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">

                                <td align="center" width="135"><font color="FFCC33">魂契狀態</font></td>
                                <td align="center" width="135">%snapshot_status%</td>
                            </tr>
                            %snapshot_info%
                        </table>
                    </td>
                </tr>

                <tr><td height=10></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=8></td></tr>

                <tr>
                    <td align=center>

                </tr>
                <tr><td height=3></td></tr>

                    </td>
                </tr>

                <tr><td height=18></td></tr>
                <tr>
                    <td align=center>
                        %snapshot_button%
                    </td>
                </tr>
                <tr><td height=8></td></tr>

                <tr>
                    <td align=center>
                        <button action="bypass -h Quest PetHatchingSystem main" value="返回主選單" width="150" height=25 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">

                </tr>
                <tr><td height=10></td></tr>
            </table>
