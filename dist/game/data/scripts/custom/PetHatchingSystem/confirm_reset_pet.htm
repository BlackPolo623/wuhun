<html><head><title>確認洗白</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr><td height=20></td></tr>

                <tr>
                    <td align=center><font color="FF4444" size="5"><b>⚠ 洗白確認</b></font></td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <font color="FFFFFF">即將對以下寵物進行洗白：</font><br>
                        <font color="FFCC33" size="4"><b>%pet_name%</b></font>
                    </td>
                </tr>
                <tr><td height=12></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="5">
                            <tr bgcolor="333333">
                                <td align=center><font color="FFCC33">洗白後將進行以下動作</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align=center><font color="FF6666">‧ 清除寵物所有訓練記錄（等級/經驗歸零）</font></td>
                            </tr>
                            %equip_line%
                            <tr bgcolor="222222">
                                <td align=center><font color="FF6666">‧ 移除現有寵物道具，給予全新同種寵物</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align=center><font color="FF4444"><b>以上操作均無法復原！</b></font></td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <font color="00FF66">洗白完成後，寵物即可進行收藏。</font>
                    </td>
                </tr>
                <tr><td height=12></td></tr>

                <tr>
                    <td align=center>
                        <table border=0 cellpadding=0 cellspacing=0>
                            <tr>
                                <td><button action="%confirm_bypass%" value="確認洗白" width=100 height=31 back="BranchSys3.icon2.ArmyTrainingInfo_down" fore="BranchSys3.icon2.ArmyTrainingInfo"></td>
                                <td width=10></td>
                                <td><button action="%back_bypass%" value="取消" width=80 height=31 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr><td height=10></td></tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
