<html><head><title>寵物洗白</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr><td height=12></td></tr>

                <tr>
                    <td align=center><font color="LEVEL" size="5"><b>寵物洗白</b></font></td>
                </tr>
                <tr><td height=5></td></tr>

                <tr>
                    <td align=center>
                        <font color="AAAAAA">以下寵物因有訓練記錄或裝備而無法收藏。</font><br>
                        <font color="AAAAAA">共 <font color="FFFF00">%count%</font> 隻需要洗白。</font>
                    </td>
                </tr>
                <tr><td height=6></td></tr>

                <tr>
                    <td align=center>
                        <table width="292" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">
                            <tr bgcolor="333333">
                                <td width=120 align=center><font color="FFCC33">寵物名稱</font></td>
                                <td width=110 align=center><font color="FFCC33">無法收藏原因</font></td>
                                <td width=60 align=center><font color="FFCC33">操作</font></td>
                            </tr>
                            %resetable_list%
                        </table>
                    </td>
                </tr>

                <tr><td height=6></td></tr>
                <tr>
                    <td align=center>%page_buttons%</td>
                </tr>
                <tr><td height=6></td></tr>

                <tr>
                    <td align=center>
                        <table border=0 cellpadding=0 cellspacing=0>
                            <tr>
                                <td><button action="bypass -h Quest PetHatchingSystem show_resetable_pets" value="重新整理" width=90 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
                                <td width=8></td>
                                <td><button action="bypass -h Quest PetHatchingSystem main" value="返回主選單" width=110 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"></td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr><td height=8></td></tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
