<html><head><title>孵化詳情</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr><td height=20></td></tr>

                <tr>
                    <td align=center><font color="LEVEL" size="4">槽位 %slot_number% 詳情</font></td>
                </tr>
                <tr><td height=15></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">
                            <tr bgcolor="222222">
                                <td align="center" width="135"><font color="FFCC33">蛋的類型</font></td>
                                <td align="center" width="135"><font color="FFFFFF">%egg_tier%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">孵化進度</font></td>
                                <td align="center"><font color="00FF66">%progress%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">剩餘時間</font></td>
                                <td align="center"><font color="FFFF00">%remaining_time%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">進階機率</font></td>
                                <td align="center"><font color="FF9900">%upgrade_chance%%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">已使用飼料</font></td>
                                <td align="center"><font color="AAAAAA">%used_feed%</font></td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr><td height=15></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=15></td></tr>

                <tr>
                    <td align=center><font color="LEVEL" size="3">孵化說明</font></td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <table width="270">
                            <tr><td><font color="AAAAAA" size="1">• 孵化時間：%hatch_time% 分鐘</font></td></tr>
                            <tr><td height=3></td></tr>
                            <tr><td><font color="AAAAAA" size="1">• 基礎進階率：%base_chance%%</font></td></tr>
                            <tr><td height=3></td></tr>
                            <tr><td><font color="AAAAAA" size="1">• 最高進階率：%max_chance%%</font></td></tr>
                            <tr><td height=3></td></tr>
                            <tr><td><font color="AAAAAA" size="1">• 每 %feed_per_percent% 飼料提升 1% 進階率</font></td></tr>
                        </table>
                    </td>
                </tr>

                <tr><td height=15></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <font color="808080" size="1">※ 離線時蛋會繼續孵化</font>
                    </td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <button action="bypass -h Quest PetHatchingSystem hatch_menu" value="返回孵化管理" width="150" height=25 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
