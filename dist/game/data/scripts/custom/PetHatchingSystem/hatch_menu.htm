<html><head><title>孵化管理</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr><td height=15></td></tr>
                <tr>
                    <td align=center><font color="LEVEL" size="5"><b>🥚 孵化管理</b></font></td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">
                            <tr bgcolor="222222">
                                <td align="center" width="135"><font color="FFCC33">總孵化次數</font></td>
                                <td align="center" width="135"><font color="00FF66">%total_hatches%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">孵化槽</font></td>
                                <td align="center"><font color="FFFF00">%current_slots% / %max_slots%</font></td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr><td height=10></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=8></td></tr>

                <tr>
                    <td align=center><font color="LEVEL" size="4">孵化槽狀態</font></td>
                </tr>
                <tr><td height=5></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="4">
                            <tr bgcolor="333333">
                                <td width="80" align="center"><font color="AAAAAA">槽位</font></td>
                                <td width="120" align="center"><font color="AAAAAA">狀態</font></td>
                                <td width="70" align="center"><font color="AAAAAA">操作</font></td>
                            </tr>
                            %slots%
                        </table>
                    </td>
                </tr>

                <tr><td height=10></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=8></td></tr>

                <tr>
                    <td align=center>
                        <font color="808080" size="1">※ 孵化時會自動消耗儲存的飼料提升進階機率</font>
                    </td>
                </tr>
                <tr><td height=5></td></tr>
                <tr>
                    <td align=center>
                        <font color="808080" size="1">※ 傳說蛋孵化完成後直接開蛋</font>
                    </td>
                </tr>
                <tr><td height=10></td></tr>

                <tr>
                    <td align=center>
                        <button action="bypass -h Quest PetHatchingSystem main" value="返回主選單" width="150" height=25 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
