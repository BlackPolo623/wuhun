<html><head><title>寵物收藏</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
    <tr>
        <td valign="top" align="center">
            <table border=0 cellpadding=0 cellspacing=0>
                <tr><td height=10></td></tr>
                <tr>
                    <td align=center><font color="LEVEL" size="5"><b>📚 寵物收藏</b></font></td>
                </tr>
                <tr><td height=8></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">
                            <tr bgcolor="222222">
                                <td align="center" width="135"><font color="FFCC33">已收藏數量</font></td>
                                <td align="center" width="135"><font color="00FF66">%total_collected% / %total_pets%</font></td>
                            </tr>
                            <tr bgcolor="222222">
                                <td align="center"><font color="FFCC33">收藏獎勵技能</font></td>
                                <td align="center"><font color="FFFF00">技能 104999 Lv.%total_collected%</font></td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr><td height=8></td></tr>
                <tr>
                    <td align=center>
                        <font color="AAAAAA">頁面：%page_buttons%</font>
                    </td>
                </tr>
                <tr><td height=5></td></tr>
                <tr>
                    <td align=center><img src="L2UI.SquareGray" width="270" height="1"></td>
                </tr>
                <tr><td height=5></td></tr>

                <tr>
                    <td align=center>
                        <table width="270" bgcolor="111111" border="0" cellspacing="1" cellpadding="3">
                            <tr bgcolor="333333">
                                <td width="50" align="center"><font color="AAAAAA">編號</font></td>
                                <td width="100" align="center"><font color="AAAAAA">道具ID</font></td>
                                <td width="80" align="center"><font color="AAAAAA">狀態</font></td>
                                <td width="40" align="center"><font color="AAAAAA">操作</font></td>
                            </tr>
                            %collection_list%
                        </table>
                    </td>
                </tr>

                <tr><td height=8></td></tr>
                <tr>
                    <td align=center>
                        <font color="808080" size="1">※ 每收藏一隻寵物可獲得技能 104999 對應等級</font>
                    </td>
                </tr>
                <tr><td height=5></td></tr>
                <tr>
                    <td align=center>
                        <font color="808080" size="1">※ 每種寵物只能收藏一隻，且背包中只能有一隻才可收藏</font>
                    </td>
                </tr>
                <tr><td height=8></td></tr>
                <tr>
                    <td align=center>
                        <button action="bypass -h Quest PetHatchingSystem main" value="返回主選單" width="150" height=25 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
