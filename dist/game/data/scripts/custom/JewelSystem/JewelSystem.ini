# =======================================================
# 寶玉系統配置 (Jewel System Configuration)
# =======================================================
# 此配置文件控制寶玉系統的所有設置
# 修改後需要重啟服務器或使用 //reload 命令
# =======================================================

# -------------------------------------------------------
# 基本設置
# -------------------------------------------------------

# 系統啟用道具 ID (消耗此道具啟用寶玉系統)
ActivationItemId = 112000

# 數值揭露道具 ID
RevealValueItemId = 112001

# 加成突破道具 ID
BreakthroughItemId = 112002

# NPC ID
NpcId = 900036

# -------------------------------------------------------
# 數值揭露設置 (20個階段)
# -------------------------------------------------------
# 格式: 階段 = 最小值,最大值,消耗道具數量
# 每個階段揭露的數值範圍和消耗

# 第1-5階段 (第一區間)
Stage1.Value = 10000,300000,1000
Stage2.Value = 10000,300000,2000
Stage3.Value = 10000,300000,3000
Stage4.Value = 10000,300000,4000
Stage5.Value = 10000,300000,5000

# 第6-10階段 (第二區間)
Stage6.Value = 10000,300000,6000
Stage7.Value = 10000,300000,7000
Stage8.Value = 10000,300000,8000
Stage9.Value = 10000,300000,9000
Stage10.Value = 10000,300000,10000

# 第11-15階段 (第三區間)
Stage11.Value = 10000,300000,11000
Stage12.Value = 10000,300000,12000
Stage13.Value = 10000,300000,13000
Stage14.Value = 10000,300000,14000
Stage15.Value = 10000,300000,15000

# 第16-20階段 (第四區間)
Stage16.Value = 10000,300000,16000
Stage17.Value = 10000,300000,17000
Stage18.Value = 10000,300000,18000
Stage19.Value = 10000,300000,19000
Stage20.Value = 10000,300000,20000

# -------------------------------------------------------
# 加成突破設置
# -------------------------------------------------------
# 加成百分比 (按區間設定)
# 1-5階段: 100%
# 6-10階段: 200%
# 11-15階段: 300%
# 16-20階段: 400%

BonusPercent.Tier1 = 150
BonusPercent.Tier2 = 200
BonusPercent.Tier3 = 250
BonusPercent.Tier4 = 300

# -------------------------------------------------------
# 突破機率設置 (每5階段循環)
# -------------------------------------------------------
# 格式: 成功率,失敗率,倒退率 (總和必須為100)

# 0→1 階段突破
Breakthrough.0to1 = 50,20,30

# 1→2 階段突破
Breakthrough.1to2 = 40,20,40

# 2→3 階段突破
Breakthrough.2to3 = 30,20,50

# 3→4 階段突破
Breakthrough.3to4 = 20,20,60

# 4→5 階段突破
Breakthrough.4to5 = 10,20,70

# -------------------------------------------------------
# 突破消耗道具數量 (每個階段)
# -------------------------------------------------------
BreakthroughCost.0to1 = 1
BreakthroughCost.1to2 = 2
BreakthroughCost.2to3 = 3
BreakthroughCost.3to4 = 4
BreakthroughCost.4to5 = 5

# =======================================================
# 說明
# =======================================================
# 數值計算方式:
# 總物攻/魔攻加成 = Σ(每階段揭露數值 × 該階段加成百分比)
#
# 例如:
# 第1階段揭露 100000, 加成已突破到200% → 實際加成 200000
# 第2階段揭露 50000, 加成未突破 → 實際加成 50000 (基礎100%)
# 總加成 = 250000
#
# 初始化規則:
# - 初始化按鈕只在第5、10、15、20階段出現
# - 初始化會將當前區間的數值歸零
# - 加成突破獨立運作，不受初始化影響
# =======================================================
