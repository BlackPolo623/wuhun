<html><head><title>禁忌精煉確認</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
<tr><td valign="top" align="center">

  <table border=0 width=270><tr><td height=10></td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <font color="FF6060" size="3"><b>禁忌精煉確認</b></font>
  </td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td width=4></td>
        <td><font color="FFCC44">部位</font></td>
        <td align=right><font color="FFFFFF">%slot_name%</font></td>
        <td width=4></td></tr>
  </table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td width=4></td>
        <td><font color="FFCC44">裝備</font></td>
        <td align=right><font color="88FF88">%item_name%</font></td>
        <td width=4></td></tr>
  </table>

  <table border=0 width=270><tr><td height=8></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=444444 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=6></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <font color="FF6060">執行禁忌精煉將會：</font>
  </td></tr></table>
  <table border=0 width=270><tr><td height=3></td></tr></table>
  <table width=270 border=0><tr><td>
    <font color="FFFFFF">　- 消耗指定道具</font>
  </td></tr></table>
  <table width=270 border=0><tr><td>
    <font color="FFFFFF">　- 此裝備所有剩餘精煉次數歸零</font>
  </td></tr></table>
  <table width=270 border=0><tr><td>
    <font color="FF6060">　- 有 %destroy_chance%% 機率失敗</font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=6></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=2></td></tr></table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <font color="FF3030" size="3"><b>失敗時此裝備將直接消失</b></font>
  </td></tr></table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <font color="FF6060">已銷毀之裝備無法以任何方式復原</font>
  </td></tr></table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=2></td></tr></table>

  %protection_block%

  <table border=0 width=270><tr><td height=8></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=444444 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0><tr>
    <td align=center>
      <button value="確認執行" action="bypass -h Quest RefineSystem forbidden_execute_%slot%"
        width=120 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
    </td>
    <td align=center>
      <button value="取消" action="bypass -h Quest RefineSystem forbidden_main"
        width=120 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
    </td>
  </tr></table>

</td></tr>
</table>
</body>
</html>
