<html><head><title>裝備精煉</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
<tr><td valign="top" align="center">

  <table border=0 width=270><tr><td height=10></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td bgcolor=CC7700 height=1></td></tr>
  </table>

  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr>
      <td width=192><font color="FFCC44"><b>武器精煉</b></font></td>
      <td width=78 align=center>
        <button value="進入" action="bypass -h Quest RefineSystem weapon_slot_weapon"
          width=68 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
  </table>

  <table width=270 border=0><tr><td height=1></td></tr></table>

  <table width=270 border=0><tr><td>
    <font color="AAAAAA" size="1">主武器，精煉後獲得隨機詞條加成</font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=5></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr>
      <td width=192><font color="FFCC44"><b>防具精煉</b></font></td>
      <td width=78 align=center>
        <button value="進入" action="bypass -h Quest RefineSystem armor_slot_head"
          width=68 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
  </table>

  <table width=270 border=0><tr><td height=1></td></tr></table>

  <table width=270 border=0><tr><td>
    <font color="AAAAAA" size="1">頭/胸/腿/手/鞋，精煉後獲得隨機詞條加成</font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=5></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr>
      <td width=192><font color="FFCC44"><b>飾品精煉</b></font></td>
      <td width=78 align=center>
        <button value="進入" action="bypass -h Quest RefineSystem jewelry_slot_neck"
          width=68 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
  </table>

  <table width=270 border=0><tr><td height=1></td></tr></table>

  <table width=270 border=0><tr><td>
    <font color="AAAAAA" size="1">項鍊/耳環/戒指，精煉後獲得隨機詞條加成</font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td bgcolor=CC7700 height=1></td></tr>
  </table>

  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="查看全身精煉效果" action="bypass -h Quest RefineSystem show_summary"
      width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

  <table border=0 width=270><tr><td height=5></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="精煉詞條一覽" action="bypass -h Quest RefineSystem show_info"
      width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

  <table border=0 width=270><tr><td height=5></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="自動精煉過濾器設定" action="bypass -h Quest RefineSystem show_filter"
      width=200 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

</td></tr>
</table>
</body>
</html>
