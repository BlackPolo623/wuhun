<html><head><title>禁忌精煉</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
<tr><td valign="top" align="center">

  <table border=0 width=270><tr><td height=8></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <font color="FF6060" size="3"><b>禁忌精煉</b></font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=6></td></tr></table>

  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td width=110><font color="FFCC44">每日剩餘次數</font></td>
        <td align=right><font color="%daily_color%">%daily_remain% / %daily_max%</font></td></tr>
  </table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td width=110><font color="FFCC44">補充次數</font></td>
        <td align=right><font color="88FF88">%bonus_count%</font></td></tr>
  </table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0>
    <tr><td width=110><font color="FFCC44">裝備消失機率</font></td>
        <td align=right><font color="FF6060">%destroy_chance%%</font></td></tr>
  </table>

  <table border=0 width=270><tr><td height=6></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=2></td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <font color="FF3030"><b>警告：失敗時裝備將直接消失！</b></font>
  </td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <font color="FF6060">執行前請務必三思，已銷毀之裝備無法復原</font>
  </td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=AA0000 height=2></td></tr></table>

  %protection_block%

  <table border=0 width=270><tr><td height=6></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=444444 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td><font color="CC7700">每次消耗道具</font></td></tr></table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  %cost_rows%

  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=444444 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td><font color="CC7700">選擇精煉部位</font></td></tr></table>
  <table border=0 width=270><tr><td height=2></td></tr></table>
  %slot_buttons%

  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0><tr><td align=center>
    <button value="返回主頁" action="bypass -h Quest RefineSystem main"
      width=200 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

</td></tr>
</table>
</body>
</html>
