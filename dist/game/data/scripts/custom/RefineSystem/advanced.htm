<html><head><title>進階自動精煉</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
<tr><td valign="top" align="center">

  <table border=0 width=270><tr><td height=6></td></tr></table>
  <table width=270 border=0><tr>
    <td><font color="FFCC44">%slot_name%</font></td>
    <td align=right><font color="%charges_color%">剩餘 %charges%/%max_charges% 次</font></td>
  </tr></table>

  <table border=0 width=270><tr><td height=3></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=CC7700 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <font color="CC7700" size="4"><b>新增過濾條件</b></font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="選擇詞條..." action="bypass -h Quest RefineSystem adv_pick_%slot%_0"
      width=200 height=26 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=444444 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td>
    <font color="CC7700">已設定條件</font>
    <font color="666666" size="1">（任一達成即停止）</font>
  </td></tr></table>

  <table border=0 width=270><tr><td height=3></td></tr></table>

  %filter_rows%

  <table border=0 width=270><tr><td height=4></td></tr></table>
  <table width=270 border=0 cellpadding=0 cellspacing=0><tr><td bgcolor=CC7700 height=1></td></tr></table>
  <table border=0 width=270><tr><td height=4></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="開始自動精煉" action="bypass -h Quest RefineSystem adv_refine_%slot%"
      width=180 height=28 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

  %premium_button%

  <table border=0 width=270><tr><td height=3></td></tr></table>

  <table width=270 border=0><tr><td align=center>
    <button value="返回" action="bypass -h Quest RefineSystem %back_event%"
      width=120 height=22 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
  </td></tr></table>

</td></tr>
</table>
</body>
</html>
