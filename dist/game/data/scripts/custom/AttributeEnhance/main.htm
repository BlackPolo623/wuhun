<html><head><title>屬性強化師</title></head>
<body scroll="no">
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358>
<tr><td valign="top" align="center">


  <table border=0 cellpadding=0 cellspacing=0>
    <tr><td height=8></td></tr>
    <tr><td align=center><font color="AAAAAA">選擇要強化的裝備類型</font></td></tr>
    <tr><td height=8></td></tr>
  </table>

  <img src="L2UI.SquareGray" width="280" height="1"><br>

  <table width=280 bgcolor=111111 cellpadding=4 cellspacing=1>
    <tr bgcolor=1A1A2A>
      <td>
        <font color="FFCC33"><b>防具屬性強化</b></font><br>
        <font color="AAAAAA" size="1">頭/胸/腿/手/鞋，每部位最多三種防禦屬性</font>
      </td>
      <td width=75 align=center>
        <button value="進入" action="bypass -h Quest AttributeEnhance armor"
          width=70 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
    <tr bgcolor=1A2A1A>
      <td>
        <font color="FFCC33"><b>武器屬性強化</b></font><br>
        <font color="AAAAAA" size="1">主武器/副手，各只能有一種攻擊屬性</font>
      </td>
      <td width=75 align=center>
        <button value="進入" action="bypass -h Quest AttributeEnhance weapon"
          width=70 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
    <tr bgcolor=2A1A2A>
      <td>
        <font color="FFCC33"><b>飾品隨機屬性</b></font><br>
        <font color="AAAAAA" size="1">項鍊/戒指/耳環，隨機洗出多種防禦屬性</font>
      </td>
      <td width=75 align=center>
        <button value="進入" action="bypass -h Quest AttributeEnhance jewelry"
          width=70 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
  </table>

  <img src="L2UI.SquareGray" width="280" height="1"><br>

  <table width=280 cellpadding=3>
    <tr>
      <td align=center>
        <button value="查看我的屬性總覽" action="bypass -h Quest AttributeEnhance status"
          width=200 height=24 back="L2UI_CT1.Button_DF_Down" fore="L2UI_CT1.Button_DF"/>
      </td>
    </tr>
  </table>

</td></tr>
</table>
</body>
</html>
