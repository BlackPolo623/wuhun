<html>
	<head><title>婚姻介紹所</title></head>
	<body>

		要結婚,你首先必須訂婚。<br>
		要訂婚,只需選定你想要的伴侶並輸入指令 ".訂婚" (不含引號)。<br>
		為了讓這個功能生效,你們雙方需要在彼此的好友名單中。<br>
		要做到這一點,你需要輸入 "/friendinvite 玩家名稱" (不含引號),其中玩家名稱是你伴侶的名字。<br>
		訂婚後,你就可以來找我結婚。<br>
		你們雙方都必須穿著禮服才能進行,婚禮將花費 %fee% 金幣。<br>
		結婚後,你可以使用指令 ".尋找愛人" (不含引號),隨時傳送到你的伴侶身邊。<br>
		如果你想要離婚,只需輸入指令 ".離婚" (不含引號)。<br>
		<center>
			<Button ALIGN=LEFT ICON="NORMAL" action="bypass -h Quest Wedding start">返回</Button>
		</center>
	</body>
</html>
