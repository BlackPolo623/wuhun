<html><body>嗡嗡貓:<br>
幸會幸會！我是嗡嗡貓，弗洛蘭農夫福德森忠實的左右手。我家老闆可是整個亞丁大陸最了不起的農業奇才之一。今年夏天大豐收之後，福德森老闆決定再接再厲，投資了一批改良版的魔法西瓜種子，準備在秋季大展身手。幸運的是，我們的種子比需求還多得多，倒是非常缺乏花蜜——畢竟要養出飽滿圓潤的大西瓜，可少不了花蜜的滋養啊！<br>
要不要幫幫我呢？<br>
我可以用種子跟你交換花蜜。花蜜很好取得，只要在世界各地打倒與你等級相近的怪物，就能獲得了。<br>
